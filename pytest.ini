[pytest]
# Minimal pytest config for vugg-simulator.
# Run all tests:    python -m pytest
# Run single file:  python -m pytest tests/test_engine_gates.py
# Run by mineral:   python -m pytest -k barite
# Verbose:          python -m pytest -v
# Stop on first:    python -m pytest -x

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts =
    --tb=short
    -ra

# Markers — declare to suppress "unknown marker" warnings
markers =
    slow: marks tests that run a full scenario (>5s); skip with -m "not slow"
    parity: cross-runtime Python/JS parity tests (require node)

# Filter known-noisy warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning:dataclasses
